image: ${BENCHMARKS_REGISTRY}/${BENCHMARKS_CONTAINER}${BENCHMARKS_SIGIL}${BENCHMARKS_TAG}

variables:
  RECO: "eicrecon"
  DETECTOR: epic
  DETECTOR_CONFIG: epic_craterlake
  SNAKEMAKE_FLAGS: '--cache'
  GITHUB_BASE_REF: ''
  GITHUB_BASE_SHA: ''

workflow:
  name: '$PIPELINE_NAME'

default:
  id_tokens:
    CI_JOB_JWT:
      aud: ${CI_SERVER_PROTOCOL}://${CI_SERVER_HOST}
  before_script:
    - source .local/bin/env.sh
  tags:
    - phy-scratch
  artifacts:
    expire_in: 3 days
    paths:
      - .local/detector
      - .local/lib
      - .local/bin
      - .local/include
      - .local/share
      - .local/root_build
      - .snakemake/log
      - results
      - config
      - .env
      - summary.txt
    reports:
      dotenv: .env
    when: always

stages:
  - status-pending
  - config
  - compile
  - generate
  - simulate
  - collect
  - finish
  - upload
  - compare
  - status-report

.status:
  image: curlimages/curl:latest
  rules:
    - if: $GITHUB_SHA !~ /^$/ # when GITHUB_SHA non-empty
  before_script: []
  script:
    - |
      curl \
        -X POST \
        -H "Accept: application/vnd.github+json" \
        -H "Authorization: token ${GITHUB_REPO_STATUS_TOKEN}" \
        "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
        -d '{"state":"'"${STATE}"'",
             "target_url":"'"${CI_PIPELINE_URL}"'",
             "description":"'"$(TZ=America/New_York date)"'",
             "context":"eicweb/physics_benchmarks ('"${BENCHMARKS_TAG}"', '"$DETECTOR_CONFIG"')"
            }' ;
  retry:
    max: 2
    when:
      - runner_system_failure

benchmarks:physics:pending:
  stage: status-pending
  extends: .status
  variables:
    STATE: "pending"
  when: always

common:setup:
  stage: config
  before_script:
    - |
      if [[ -z "${COMMON_BENCH_VERSION}" ]] ; then
        export COMMON_BENCH_VERSION="master" 
      fi
      echo "COMMON_BENCH_VERSION = ${COMMON_BENCH_VERSION}" 
      echo "COMMON_BENCH_VERSION=${COMMON_BENCH_VERSION}" >> .env
  script:
    - git clone -b "${COMMON_BENCH_VERSION}" https://eicweb.phy.anl.gov/EIC/benchmarks/common_bench.git setup 
    - source setup/bin/env.sh && ./setup/bin/install_common.sh
    - mkdir_local_data_link sim_output
    - mkdir_local_data_link datasets
    - mkdir -p results
    - mkdir -p config
    - print_env.sh

.compile_benchmark:
  needs:
    - ["common:setup"]
  before_script:
    - source .local/bin/env.sh  
  retry:
    max: 2
    when:
      - runner_system_failure

.phy_benchmark:
  needs:
    - ["common:setup"]
  before_script:
    - source .local/bin/env.sh
    - source /opt/detector/epic-main/bin/thisepic.sh
    - ls -lrtha 
    - ln -s "${LOCAL_DATA_PATH}/sim_output" sim_output
    - ln -s "${LOCAL_DATA_PATH}/datasets/data" data
    - mkdir -p "$SNAKEMAKE_OUTPUT_CACHE"
    - ls -lrtha
  retry:
    max: 2
    when:
      - runner_system_failure

include:
  - local: 'benchmarks/Exclusive-Diffraction-Tagging/diffractive_vm/config.yml'
  - local: 'benchmarks/Exclusive-Diffraction-Tagging/demp/config.yml'
  - local: 'benchmarks/Exclusive-Diffraction-Tagging/semi_coherent/config.yml'
    #- local: 'benchmarks/Exclusive-Diffraction-Tagging/dvmp/config.yml'
  - local: 'benchmarks/Exclusive-Diffraction-Tagging/dvcs/config.yml'
  - local: 'benchmarks/Exclusive-Diffraction-Tagging/tcs/config.yml'
  - local: 'benchmarks/Exclusive-Diffraction-Tagging/u_omega/config.yml'
  - local: 'benchmarks/Inclusive/dis/config.yml'

summary:
  stage: finish
  needs:
    - "diffractive_vm:results"
    - "demp:results"
    - "dis:results"
    - "dvcs:results"
    - "tcs:results"
    - "u_omega:results"
  script:
    - collect_benchmarks.py
    - find results -print | sort | tee summary.txt
  artifacts:
    paths:
      - summary.txt
      - results/*
#    reports:
#      junit: ["results/dvcs/report2.xml"]
  retry:
    max: 2
    when:
      - runner_system_failure

upload:physics:
  stage: upload
  image: docker.io/rucio/rucio-clients:latest
  needs:
    - "summary"
  rules:
    - when: on_success
  variables:
    RUCIO_ACCOUNT: eicprod
  before_script:
    - echo "${RUCIO_CONFIG}" | base64 -d > /opt/rucio/etc/rucio.cfg
  script:
    - |
      if [ -n "${GITHUB_PR}" ]; then
        DID_PREFIX="benchmarks/physics_benchmarks/pr/${GITHUB_PR}/${GITHUB_SHA}"
      else
        SHA="${GITHUB_SHA:-${CI_COMMIT_SHA}}"
        DID_PREFIX="benchmarks/physics_benchmarks/baseline/${CI_COMMIT_REF_NAME}/${SHA}"
      fi
    - |
      find results -name "*.root" | while read f; do
        RELPATH="${f#results/}"
        rucio upload --rse EIC-XRD --scope epic --name "${DID_PREFIX}/${RELPATH}" "$f"
      done
    - |
      if [ -z "${GITHUB_PR}" ]; then
        SHA="${GITHUB_SHA:-${CI_COMMIT_SHA}}"
        LATEST="epic:benchmarks/physics_benchmarks/baseline/${CI_COMMIT_REF_NAME}/latest"
        rucio add-dataset "${LATEST}" 2>/dev/null || true
        find results -name "*.root" | while read f; do
          RELPATH="${f#results/}"
          rucio detach "${LATEST}" "epic:${DID_PREFIX}/${RELPATH}" 2>/dev/null || true
          rucio attach "${LATEST}" "epic:${DID_PREFIX}/${RELPATH}"
        done
      fi
  allow_failure: true

compare:physics:
  stage: compare
  needs:
    - "upload:physics"
  rules:
    - if: '$GITHUB_PR != ""'
  variables:
    RUCIO_ACCOUNT: eicprod
  image: docker.io/rucio/rucio-clients:latest
  before_script:
    - echo "${RUCIO_CONFIG}" | base64 -d > /opt/rucio/etc/rucio.cfg
    - pip install --quiet epic-capybara
  script:
    - |
      BASELINE_DID="epic:benchmarks/physics_benchmarks/baseline/${GITHUB_BASE_REF}/latest"
      rucio download "${BASELINE_DID}" --dir baseline/
    - |
      DASHBOARD_URL=$(capybara bara results/ baseline/ 2>&1 | tail -1 || true)
      DASHBOARD_URL=$(cate capybara-reports/ 2>&1 | tail -1 || true)
      capybara comment \
        --owner "${GITHUB_REPOSITORY%/*}" \
        --repo "${GITHUB_REPOSITORY#*/}" \
        --pr "${GITHUB_PR}" \
        --url "${DASHBOARD_URL}" \
        --title "Physics Benchmark Comparison (PR #${GITHUB_PR})"
  allow_failure: true

benchmarks:physics:success:
  stage: status-report
  dependencies: []
  extends: .status
  variables:
    STATE: "success"
  after_script:
    # Cleanup scratch space
    - rm -rfv $LOCAL_DATA_PATH
  when: on_success

benchmarks:physics:failure:
  stage: status-report
  dependencies: []
  extends: .status
  variables:
    STATE: "failure"
  when: on_failure
